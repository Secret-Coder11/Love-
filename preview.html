<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda 🐼💖</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow-x: hidden;
    transition: 0.5s;
}

.dark {
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 20px;
}

/* PANDA */
.panda {
    font-size: 80px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* TITLE */
h1 {
    font-size: 2.5rem;
    margin: 10px 0;
}

/* MESSAGE */
.message {
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.8);
}

/* BUTTON */
button {
    margin: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: #ff6f91;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ff3f6c;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* SLIDER */
.slider {
    margin-top: 20px;
}

.slider img {
    width: 250px;
    height: 250px;
    border-radius: 20px;
    object-fit: cover;
}

/* GAME AREA */
#gameArea {
    position: relative;
    height: 300px;
    margin-top: 20px;
    border: 2px dashed #fff;
    overflow: hidden;
}

.gameHeart {
    position: absolute;
    font-size: 25px;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.modalContent {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

/* RESPONSIVE */
@media(max-width:600px) {
    h1 { font-size: 1.8rem; }
    .message { font-size: 0.9rem; }
}
</style>
</head>

<body>

<div class="container">

<div class="panda">🐼</div>
<h1>Hey My Panda 💖</h1>

<div class="message" id="typing"></div>

<button onclick="showLove()">Make Panda Smile 😄</button>
<button onclick="toggleMode()">🌙 Toggle Mode</button>
<button onclick="openModal()">🎁 Surprise</button>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
</audio>
<button onclick="toggleMusic()">🎵 Music</button>

<!-- SLIDER -->
<div class="slider">
    <img id="slide" src="https://picsum.photos/300?1">
</div>

<!-- GAME -->
<h2>Catch Love 💖</h2>
<div id="gameArea"></div>
<p>Score: <span id="score">0</span></p>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modalContent">
        <h2>Panda 🐼💞</h2>
        <p>You are my favorite person forever 😤💖</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>

/* TYPING EFFECT */
let text = "You are the cutest panda in the whole universe 🐼💖 and I just want to see you smile today 😭✨";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

/* HEARTS */
function showLove() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random()*100+"vw";
        heart.style.fontSize = Math.random()*20+10+"px";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),5000);
    },200);
}

/* DARK MODE */
function toggleMode() {
    document.body.classList.toggle("dark");
}

/* MUSIC */
let playing = false;
function toggleMusic() {
    let music = document.getElementById("music");
    if(!playing){
        music.play();
        playing = true;
    } else {
        music.pause();
        playing = false;
    }
}

/* SLIDER */
let images = [
    "https://picsum.photos/300?1",
    "https://picsum.photos/300?2",
    "https://picsum.photos/300?3"
];

let index = 0;
setInterval(()=>{
    index = (index+1)%images.length;
    document.getElementById("slide").src = images[index];
},2000);

/* GAME */
let score = 0;

function spawnHeart(){
    let heart = document.createElement("div");
    heart.classList.add("gameHeart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*90+"%";
    heart.style.top = "0px";

    document.getElementById("gameArea").appendChild(heart);

    let fall = setInterval(()=>{
        heart.style.top = (heart.offsetTop + 5)+"px";

        if(heart.offsetTop > 300){
            heart.remove();
            clearInterval(fall);
        }
    },30);

    heart.onclick = ()=>{
        score++;
        document.getElementById("score").innerText = score;
        heart.remove();
        clearInterval(fall);
    };
}

setInterval(spawnHeart,1000);

/* MODAL */
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
